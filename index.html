<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fundația Umanitară Meridians</title>
    <style>
        /* [Stiluri CSS pentru așezare laterală și responsivitate] */
        body { font-family: sans-serif; background-color: #eafaf1; }
        main { display: flex; justify-content: center; gap: 20px; padding: 20px; flex-wrap: wrap; }
        .side-image { width: 250px; height: 350px; object-fit: cover; border-radius: 16px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .container { background-color: white; padding: 30px; border-radius: 16px; max-width: 600px; flex: 1; }
        @media (max-width: 900px) { main { flex-direction: column; align-items: center; } .side-image { width: 100%; height: 200px; } }
    </style>
</head>
<body>
    <main>
        <!-- Imagine Stânga -->
        <img class="side-image" src="https://unsplash.com" alt="Educație">
        
        <!-- Conținut Central -->
        <div class="container">
            <h1>Fundația Meridians</h1>
            <p>Misiunea noastră: sprijin și speranță.</p>
        </div>
        
        <!-- Imagine Dreapta -->
        <img class="side-image" src="https://unsplash.com" alt="Comunitate">
    </main>
</body>
</html>
